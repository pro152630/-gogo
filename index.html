<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單管理系統 V23.4 - 格式化備註</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #34495e; --bg: #f5f7fa; --danger: #ff4d4f; --edit: #f39c12; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .tab-bar { display: flex; background: var(--secondary); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #adb5bd; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--primary); background: rgba(255,255,255,0.1); }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }
        .shop-order-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .shop-title { font-size: 22px; font-weight: bold; color: var(--secondary); margin-bottom: 5px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .shop-note-display { font-size: 14px; color: #555; margin-bottom: 15px; padding: 12px; background: #fdf6ec; border-radius: 8px; white-space: pre-line; line-height: 1.6; border-left: 3px solid #f39c12; }
        .image-frame { width: 100%; height: 350px; border-radius: 12px; margin-bottom: 15px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; border: 1px solid #eee; }
        .image-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .admin-controls { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .history-card { border: 2px solid #e2e8f0; border-radius: 10px; overflow: hidden; background: #fff; position: relative; opacity: 0.6; filter: grayscale(100%); transition: 0.3s; }
        .history-card.is-active { opacity: 1; filter: grayscale(0%); border-color: var(--primary); box-shadow: 0 4px 10px rgba(74,144,226,0.15); }
        .history-card img { width: 100%; height: 100px; object-fit: cover; cursor: pointer; }
        input, textarea, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn { border: none; border-radius: 6px; padding: 10px 15px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-edit { background: var(--edit); color: white; font-size: 12px; padding: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        #lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:1100; }
        #lightbox img { max-width: 95%; max-height: 95%; }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchPage('page-view')">📋 今日點餐</button>
    <button class="tab-btn" onclick="switchPage('page-admin')">⚙️ 餐廳管理</button>
    <button class="tab-btn" onclick="switchPage('page-summary')">📊 數量統計</button>
</div>

<div class="container">
    <div id="page-view" class="page active">
        <div id="activeOrdersList"></div>
        <div id="emptyViewHint" style="text-align:center; color:#999; padding:80px 20px;">
            <h3>🍴 今日尚未挑選餐廳</h3>
            <p>請前往「餐廳管理」頁面點擊圖片來啟用。</p>
        </div>
    </div>

    <div id="page-admin" class="page">
        <div class="admin-controls">
            <h3>➕ 新增餐廳</h3>
            <input type="text" id="newName" placeholder="餐廳名稱" style="margin-bottom:10px;">
            <select id="newCategory" style="margin-bottom:10px;">
                <option value="主食">🍱 主食</option>
                <option value="飲料">🥤 飲料</option>
                <option value="甜品">🍰 甜品</option>
            </select>
            <textarea id="newNote" style="margin-bottom:10px; height:100px;" placeholder="備註資訊">電話：&#10;時間：&#10;公休：</textarea>
            <input type="file" id="newFile" accept="image/*" style="margin-bottom:10px;">
            <button id="addBtn" class="btn btn-primary" style="width:100%;" onclick="addShop()">儲存並同步</button>
            <p id="loadingHint" style="display:none; color: var(--primary); text-align:center;">正在處理圖片...</p>
        </div>
        <div class="admin-controls">
            <button class="btn btn-danger" style="width:100%; background:#666;" onclick="resetAllOrders()">🧹 清除今日所有點餐紀錄</button>
        </div>
        <div class="history-grid" id="historyGrid"></div>
    </div>

    <div id="page-summary" class="page">
        <div id="summaryContent"></div>
    </div>
</div>

<!-- 編輯彈窗 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>📝 修改餐廳資訊</h3>
        <label>名稱：</label>
        <input type="text" id="editName" style="margin-bottom: 15px;">
        <label>備註：</label>
        <textarea id="editNote" style="margin-bottom: 20px; height: 120px;"></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">儲存</button>
            <button class="btn" style="flex:1; background:#ccc" onclick="closeEdit()">取消</button>
        </div>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="boxImg" src=""></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDvyMOFN_SkG7akkuoCH59EThRy0hJHDs4",
        authDomain: "gogo-d01d2.firebaseapp.com",
        databaseURL: "https://gogo-d01d2-default-rtdb.firebaseio.com",
        projectId: "gogo-d01d2",
        storageBucket: "gogo-d01d2.firebasestorage.app",
        messagingSenderId: "964957638713",
        appId: "1:964957638713:web:992232106543c5f10d3de8",
        measurementId: "G-5TMLTVRSGC"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const dbRef = ref(database, 'orderSystem_V23');

    let db = [];
    let curEditId = null;

    onValue(dbRef, (snapshot) => {
        db = snapshot.val() || [];
        renderViewPage();
        renderAdminGrid();
        if(document.getElementById('page-summary').classList.contains('active')) renderSummaryPage();
    });

    function save() { set(dbRef, db); }

    window.switchPage = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if (window.event) window.event.currentTarget.classList.add('active');
        if(pageId === 'page-view') renderViewPage();
        if(pageId === 'page-summary') renderSummaryPage();
    };

    window.addDetail = (id) => {
        const pI = document.getElementById(`p-${id}`), iI = document.getElementById(`i-${id}`), mI = document.getElementById(`m-${id}`);
        const p = pI.value.trim(), i = iI.value.trim(), m = mI.value.trim();
        if(!p || !i || !m) return alert("請填寫姓名、餐點與金額");
        const sIdx = db.findIndex(s => s.id === id);
        if(!db[sIdx].details) db[sIdx].details = [];
        db[sIdx].details.push({ person: p, item: i, money: Number(m), isDone: false });
        save();
        iI.value = ""; mI.value = ""; iI.focus();
    };

    window.addShop = async () => {
        const name = document.getElementById('newName').value, file = document.getElementById('newFile').files[0];
        if (!name || !file) return alert("請填寫名稱並上傳菜單圖片");
        document.getElementById('addBtn').disabled = true;
        document.getElementById('loadingHint').style.display = 'block';
        try {
            const imgData = await processImage(file);
            db.unshift({ id: Date.now(), name, category: document.getElementById('newCategory').value, note: document.getElementById('newNote').value, image: imgData, details: [], visible: false });
            save();
            document.getElementById('newName').value = ""; 
            document.getElementById('newFile').value = "";
            document.getElementById('newNote').value = "電話：\n時間：\n公休："; // 重置為預設格式
        } catch (e) { alert("圖片處理出錯"); }
        document.getElementById('addBtn').disabled = false;
        document.getElementById('loadingHint').style.display = 'none';
    };

    window.openEdit = (id) => {
        curEditId = id;
        const s = db.find(x => x.id === id);
        document.getElementById('editName').value = s.name;
        // 如果原本沒備註，也預填格式
        document.getElementById('editNote').value = s.note || "電話：\n時間：\n公休：";
        document.getElementById('editModal').style.display = 'flex';
    };
    window.saveEdit = () => {
        const s = db.find(x => x.id === curEditId);
        if(s) {
            s.name = document.getElementById('editName').value;
            s.note = document.getElementById('editNote').value;
            save();
        }
        closeEdit();
    };
    window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; };

    window.toggleShop = (id) => { const s = db.find(x => x.id === id); s.visible = !s.visible; save(); };
    window.delShop = (id) => { if(confirm("確定刪除這間餐廳嗎？")) { db = db.filter(s => s.id !== id); save(); } };
    window.toggleDone = (sId, idx) => { db.find(s => s.id === sId).details[idx].isDone = !db.find(s => s.id === sId).details[idx].isDone; save(); };
    window.delDetail = (sId, idx) => { db.find(s => s.id === sId).details.splice(idx, 1); save(); };
    window.openLightbox = (src) => { document.getElementById('boxImg').src = src; document.getElementById('lightbox').style.display = 'flex'; };
    window.resetAllOrders = () => { if(confirm("確定清空所有點餐紀錄嗎？")) { db.forEach(s => s.details = []); save(); } };

    function renderViewPage() {
        const list = document.getElementById('activeOrdersList');
        const active = db.filter(s => s.visible);
        list.innerHTML = "";
        document.getElementById('emptyViewHint').style.display = active.length ? 'none' : 'block';
        active.forEach(shop => {
            const details = shop.details || [], total = details.reduce((sum, d) => sum + Number(d.money), 0);
            const div = document.createElement('div');
            div.className = 'shop-order-card';
            div.innerHTML = `
                <div class="shop-title">${shop.name}</div>
                <div class="shop-note-display">${shop.note || ''}</div>
                <div class="image-frame" onclick="openLightbox('${shop.image}')"><img src="${shop.image}"></div>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="p-${shop.id}" placeholder="姓名" style="flex:1">
                    <input type="text" id="i-${shop.id}" placeholder="餐點" style="flex:1.5">
                    <input type="number" id="m-${shop.id}" placeholder="$" style="flex:0.8">
                    <button class="btn btn-primary" onclick="addDetail(${shop.id})">加入</button>
                </div>
                <table>
                    ${details.map((d, x) => `<tr style="${d.isDone?'text-decoration:line-through;color:#aaa':''}">
                        <td><input type="checkbox" ${d.isDone?'checked':''} onchange="toggleDone(${shop.id},${x})"></td>
                        <td>${d.person}</td><td>${d.item}</td><td>${d.money}</td>
                        <td><button onclick="delDetail(${shop.id},${x})" style="border:none;background:none;color:red;cursor:pointer;">✕</button></td></tr>`).join('')}
                    <tr><td colspan="3" style="text-align:right;font-weight:bold;">總計</td><td style="color:red;font-weight:bold">$${total}</td><td></td></tr>
                </table>`;
            list.appendChild(div);
        });
    }

    function renderAdminGrid() {
        document.getElementById('historyGrid').innerHTML = db.map(s => `
            <div class="history-card ${s.visible ? 'is-active' : ''}">
                <img src="${s.image}" onclick="toggleShop(${s.id})">
                <div style="padding:10px; text-align:center;">
                    <div style="font-weight:bold;margin-bottom:5px;">${s.name}</div>
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <button class="btn btn-edit" onclick="openEdit(${s.id})">編輯</button>
                        <button class="btn btn-danger" style="padding:5px;font-size:12px;" onclick="delShop(${s.id})">刪除</button>
                    </div>
                </div>
            </div>`).join('');
    }

    function renderSummaryPage() {
        const active = db.filter(s => s.visible && s.details?.length);
        document.getElementById('summaryContent').innerHTML = active.map(shop => {
            const counts = {};
            shop.details.forEach(d => counts[d.item] = (counts[d.item] || 0) + 1);
            return `<div class="shop-order-card"><h3>${shop.name} 統計</h3>
                ${Object.entries(counts).map(([k, v]) => `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #eee;"><span>${k}</span><b>${v} 份</b></div>`).join('')}</div>`;
        }).join('') || "<div style='text-align:center;padding:50px;color:#999;'>尚無點餐數據</div>";
    }

    function processImage(file) {
        return new Promise(res => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800; const scale = max / Math.max(img.width, img.height);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    res(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }
</script>
</body>
</html>
