<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyDvyMOFN_SkG7akkuoCH59EThRy0hJHDs4",
        authDomain: "gogo-d01d2.firebaseapp.com",
        databaseURL: "https://gogo-d01d2-default-rtdb.firebaseio.com",
        projectId: "gogo-d01d2",
        storageBucket: "gogo-d01d2.firebasestorage.app",
        messagingSenderId: "964957638713",
        appId: "1:964957638713:web:992232106543c5f10d3de8",
        measurementId: "G-5TMLTVRSGC"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const dbRef = ref(database, 'orderSystem_V23');

    let db = [];

    // --- 核心：監聽雲端數據 ---
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        db = Array.isArray(data) ? data : []; // 確保 db 永遠是陣列
        renderViewPage();
        renderAdminGrid();
        if(document.getElementById('page-summary').classList.contains('active')) renderSummaryPage();
    });

    // 儲存至 Firebase
    function save() { 
        set(dbRef, db).catch(err => alert("同步失敗：" + err));
    }

    // --- 頁面切換 ---
    window.switchPage = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        const targetPage = document.getElementById(pageId);
        if (targetPage) targetPage.classList.add('active');

        // 處理按鈕高亮
        if (window.event && window.event.currentTarget) {
            window.event.currentTarget.classList.add('active');
        }

        if(pageId === 'page-view') renderViewPage();
        if(pageId === 'page-summary') renderSummaryPage();
    };

    // --- 點餐功能（已修正無反應問題） ---
    window.addDetail = (id) => {
        const pInput = document.getElementById(`p-${id}`);
        const iInput = document.getElementById(`i-${id}`);
        const mInput = document.getElementById(`m-${id}`);
        
        if (!pInput || !iInput || !mInput) return;

        const p = pInput.value.trim();
        const i = iInput.value.trim();
        const m = mInput.value.trim();
        
        if(!p || !i || !m) {
            alert("請填寫姓名、餐點與金額");
            return;
        }
        
        const shopIndex = db.findIndex(s => s.id === id);
        if (shopIndex === -1) return;

        // 初始化詳情陣列
        if(!db[shopIndex].details) db[shopIndex].details = [];
        
        db[shopIndex].details.push({
            person: p,
            item: i,
            money: Number(m),
            isDone: false
        });

        save(); // 同步雲端
        
        // 優化體驗：保留姓名，清空餐點與金額，並自動聚焦回餐點框
        iInput.value = "";
        mInput.value = "";
        iInput.focus(); 
    };

    // --- 餐廳管理 ---
    window.addShop = async () => {
        const nameEl = document.getElementById('newName');
        const fileEl = document.getElementById('newFile');
        const name = nameEl.value;
        const file = fileEl.files[0];

        if (!name || !file) return alert("請填寫名稱並上傳菜單圖片");
        
        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        document.getElementById('loadingHint').style.display = 'block';
        
        try {
            const imgData = await processImage(file);
            db.unshift({ 
                id: Date.now(), 
                name, 
                category: document.getElementById('newCategory').value, 
                note: document.getElementById('newNote').value, 
                image: imgData, 
                details: [], 
                visible: false 
            });
            save();
            nameEl.value = ""; 
            fileEl.value = "";
            alert("餐廳新增成功並已同步！");
        } catch (e) { 
            alert("圖片處理出錯，請換一張試試"); 
        } finally {
            btn.disabled = false;
            document.getElementById('loadingHint').style.display = 'none';
        }
    };

    window.toggleShop = (id) => { 
        const s = db.find(x => x.id === id); 
        if(s) { s.visible = !s.visible; save(); }
    };

    window.delShop = (id) => { 
        if(confirm("確定要徹底刪除這間餐廳嗎？")) { 
            db = db.filter(s => s.id !== id); 
            save(); 
        } 
    };

    // --- 訂單操作 ---
    window.toggleDone = (sId, idx) => {
        const shop = db.find(s => s.id === sId);
        if(shop && shop.details && shop.details[idx]) {
            shop.details[idx].isDone = !shop.details[idx].isDone;
            save();
        }
    };

    window.delDetail = (sId, idx) => {
        const shop = db.find(s => s.id === sId);
        if(shop && shop.details) {
            shop.details.splice(idx, 1);
            save();
        }
    };

    // --- 輔助功能 ---
    window.openLightbox = (src) => { 
        document.getElementById('boxImg').src = src; 
        document.getElementById('lightbox').style.display = 'flex'; 
    };

    window.resetAllOrders = () => { 
        if(confirm("警告：這將清空【所有餐廳】的今日點餐紀錄，確定嗎？")) { 
            db.forEach(s => s.details = []); 
            save(); 
        } 
    };

    // --- 渲染邏輯 ---
    function renderViewPage() {
        const list = document.getElementById('activeOrdersList');
        const active = db.filter(s => s.visible);
        list.innerHTML = "";
        
        const hint = document.getElementById('emptyViewHint');
        if (hint) hint.style.display = active.length ? 'none' : 'block';

        active.forEach(shop => {
            const details = shop.details || [];
            const total = details.reduce((sum, d) => sum + Number(d.money), 0);
            const div = document.createElement('div');
            div.className = 'shop-order-card';
            div.innerHTML = `
                <div class="shop-title">${shop.name} <span class="shop-tag">${shop.category}</span></div>
                <div class="shop-note-display">${shop.note || ''}</div>
                <div class="image-frame" onclick="openLightbox('${shop.image}')"><img src="${shop.image}"></div>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="p-${shop.id}" placeholder="姓名" style="flex:1">
                    <input type="text" id="i-${shop.id}" placeholder="餐點" style="flex:1.5">
                    <input type="number" id="m-${shop.id}" placeholder="$" style="flex:0.8">
                    <button class="btn btn-primary" onclick="addDetail(${shop.id})">加入</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>付</th><th>姓名</th><th>餐點</th><th>$</th><th>✕</th></tr></thead>
                        <tbody>
                            ${details.map((d, x) => `
                                <tr style="${d.isDone ? 'text-decoration:line-through;color:#aaa' : ''}">
                                    <td><input type="checkbox" ${d.isDone ? 'checked' : ''} onchange="toggleDone(${shop.id}, ${x})"></td>
                                    <td>${d.person}</td>
                                    <td>${d.item}</td>
                                    <td>${d.money}</td>
                                    <td><button onclick="delDetail(${shop.id}, ${x})" style="background:none;border:none;color:red;font-size:18px;cursor:pointer;">✕</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                        <tfoot>
                            <tr><td colspan="3" style="text-align:right; font-weight:bold;">總計金額：</td><td style="color:red;font-weight:bold">$${total}</td><td></td></tr>
                        </tfoot>
                    </table>
                </div>`;
            list.appendChild(div);
        });
    }

    function renderAdminGrid() {
        const grid = document.getElementById('historyGrid');
        if (!grid) return;
        const kw = document.getElementById('adminSearch').value.toLowerCase();
        const ft = document.getElementById('adminFilter').value;
        const filtered = db.filter(s => s.name.toLowerCase().includes(kw) && (ft === '全部' || s.category === ft));
        
        grid.innerHTML = filtered.map(s => `
            <div class="history-card ${s.visible ? 'is-active' : ''}">
                <img src="${s.image}" onclick="toggleShop(${s.id})">
                <div style="padding:10px; text-align:center;">
                    <div style="font-weight:bold;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.name}</div>
                    <button class="btn btn-danger" style="padding:5px 10px; font-size:12px;" onclick="delShop(${s.id})">🗑️ 刪除餐廳</button>
                </div>
            </div>`).join('');
    }

    function renderSummaryPage() {
        const container = document.getElementById('summaryContent');
        if (!container) return;
        const active = db.filter(s => s.visible && s.details && s.details.length);
        
        container.innerHTML = active.map(shop => {
            const counts = {};
            shop.details.forEach(d => { counts[d.item] = (counts[d.item] || 0) + 1; });
            return `
                <div class="shop-order-card">
                    <h3 style="border-bottom:2px solid #eee; padding-bottom:10px;">${shop.name} - 數量統計</h3>
                    ${Object.entries(counts).map(([item, count]) => `
                        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #eee;">
                            <span>${item}</span>
                            <span style="font-weight:bold; color:var(--primary);">${count} 份</span>
                        </div>
                    `).join('')}
                </div>`;
        }).join('') || `<div style="text-align:center; padding:50px; color:#999;">目前沒有點餐數據可以統計</div>`;
    }

    function processImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader(); 
            reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image(); 
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 800; // 限制最大寬度以節省 Firebase 空間
                    const scale = maxW / img.width;
                    canvas.width = maxW; 
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6)); // 0.6 壓縮率
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
</script>
